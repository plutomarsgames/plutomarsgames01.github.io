<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlutoMars Mines</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0d0d0d;
    color: white;
}

#game {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    padding: 10px;
    max-width: 400px;
    margin: auto;
}

.cell {
    aspect-ratio: 1;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    transition: 0.2s;
}

.cell:hover {
    transform: scale(1.05);
}

.revealed { background: #444; }
.mine { background: red; }

#leaderboard {
    list-style: none;
    padding: 0;
    max-width: 300px;
    margin: auto;
}

#leaderboard li {
    background: #222;
    margin: 5px;
    padding: 10px;
    border-radius: 6px;
}
</style>
</head>

<body>

<h1>💣 PlutoMars Mines (6x6)</h1>

<div>
👤 Player: <span id="playerName"></span>
<button onclick="changeName()">Change</button>
</div>

<h3>⭐ Score: <span id="score">0</span></h3>

<div id="game"></div>

<h2>🏆 Leaderboard</h2>
<ul id="leaderboard"></ul>

<button onclick="startGame()">🔄 Restart</button>

<!-- Firebase (v8 stable) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// 🔥 PUT YOUR REAL FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyA-2dE8xOlParKAHEC_9TEsdYSIj5RS0pY",
  authDomain: "plutomarsgames01.firebaseapp.com",
  projectId: "plutomarsgames01",
  storageBucket: "plutomarsgames01.firebasestorage.app",
  messagingSenderId: "634530841410",
  appId: "1:634530841410:web:3b8962f9e9a8b489567edb"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// GAME SETTINGS
const size = 6;
const minesCount = 6;

let board = [];
let score = 0;

// PLAYER NAME (SAVED PERMANENTLY)
let playerName = localStorage.getItem("playerName");

if (!playerName) {
    playerName = prompt("Enter your name:");
    if (!playerName) playerName = "Player";
    localStorage.setItem("playerName", playerName);
}

document.getElementById("playerName").innerText = playerName;

function changeName() {
    let newName = prompt("Enter new name:");
    if (newName) {
        playerName = newName;
        localStorage.setItem("playerName", playerName);
        document.getElementById("playerName").innerText = playerName;
    }
}

// START GAME
function startGame() {
    const game = document.getElementById("game");
    game.innerHTML = "";
    board = [];
    score = 0;
    updateScore();

    for (let i = 0; i < size * size; i++) {
        board.push({ mine: false, revealed: false });
    }

    let placed = 0;
    while (placed < minesCount) {
        let i = Math.floor(Math.random() * board.length);
        if (!board[i].mine) {
            board[i].mine = true;
            placed++;
        }
    }

    board.forEach((cell, index) => {
        const div = document.createElement("div");
        div.classList.add("cell");
        div.onclick = () => revealCell(index, div);
        game.appendChild(div);
    });
}

// REVEAL CELL
function revealCell(index, el) {
    if (board[index].revealed) return;

    board[index].revealed = true;
    el.classList.add("revealed");

    if (board[index].mine) {
        el.classList.add("mine");
        el.innerText = "💣";

        setTimeout(() => {
            alert("💀 Game Over");
            saveScore();
            loadLeaderboard();
            startGame();
        }, 300);

    } else {
        let count = countMines(index);
        el.innerText = count || "";

        score += 10;
        updateScore();
        checkWin();
    }
}

// COUNT MINES
function countMines(index) {
    const dirs = [-1,1,-size,size,-size-1,-size+1,size-1,size+1];
    let count = 0;

    dirs.forEach(d => {
        let i = index + d;
        if (i >= 0 && i < board.length && board[i].mine) count++;
    });

    return count;
}

// WIN CHECK
function checkWin() {
    let safe = board.filter(c => !c.mine);
    let revealed = safe.filter(c => c.revealed);

    if (safe.length === revealed.length) {
        alert("🏆 You Win!");
        saveScore();
        loadLeaderboard();
        startGame();
    }
}

// UPDATE SCORE
function updateScore() {
    document.getElementById("score").innerText = score;
}

// SAVE SCORE TO FIREBASE
function saveScore() {
    db.collection("leaderboard").add({
        name: playerName,
        score: score,
        time: new Date()
    }).then(() => {
        console.log("Saved!");
    }).catch(err => {
        console.error(err);
        alert("Error saving score");
    });
}

// LOAD LEADERBOARD
function loadLeaderboard() {
    const list = document.getElementById("leaderboard");
    list.innerHTML = "Loading...";

    db.collection("leaderboard")
      .orderBy("score", "desc")
      .limit(10)
      .get()
      .then(snapshot => {
          list.innerHTML = "";
          snapshot.forEach((doc, i) => {
              let data = doc.data();
              let li = document.createElement("li");
              li.innerText = `${i+1}. ${data.name} - ${data.score}`;
              list.appendChild(li);
          });
      });
}

// INIT
startGame();
loadLeaderboard();
</script>

</body>
</html>
